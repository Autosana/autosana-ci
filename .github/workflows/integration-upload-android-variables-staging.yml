name: "Integration: Upload Android With Variables (Staging)"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  upload-with-variables:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK
        shell: bash
        run: |
          set -euo pipefail
          APK_URL="https://jwvmttqclexlhnhfxuyq.supabase.co/storage/v1/object/public/test_app_builds/wikipedia.apk"
          echo "Downloading APK from ${APK_URL}"
          curl --fail --location --silent --show-error "${APK_URL}" --output wikipedia.apk
          test -s wikipedia.apk

      - name: Upload Android build with Autosana variables (staging)
        uses: ./
        with:
          api-key: ${{ secrets.AUTOSANA_STAGING_KEY }}
          api-url: https://staging.autosana.ai
          name: Wikipedia
          bundle-id: org.wikipedia
          platform: android
          build-path: wikipedia.apk
          variables: "TEST_RUN_SOURCE=github-action,VARIABLES_E2E_COVERAGE=enabled"
